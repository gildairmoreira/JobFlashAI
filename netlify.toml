[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Evita falhas de build por falsos positivos em arquivos gerados pelo Next.js
  # O scanner do Netlify reporta variáveis NEXT_PUBLIC_ como se fossem segredos vazados
  SECRETS_SCAN_OMIT_PATHS = ".next/**, .netlify/**"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, NEXT_PUBLIC_CLERK_SIGN_IN_URL, NEXT_PUBLIC_CLERK_SIGN_UP_URL, NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL, NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL, NEXT_PUBLIC_BASE_URL"
  NPM_FLAGS = "--no-frozen-lockfile"
